<article class="collection-card">
  <div class="collection-card__body">
    <h3 class="collection-card__name">{{ collection().name }}</h3>
    @if (collection().description) {
      <p class="collection-card__description">{{ collection().description }}</p>
    }
  </div>
  <div class="collection-card__actions">
    <button
      class="btn-secondary collection-card__action-btn"
      type="button"
      [attr.aria-label]="'Edit ' + collection().name"
      (click)="onEdit()"
    >
      <span class="material-symbols-outlined">edit</span>
    </button>
    <button
      class="btn-danger collection-card__action-btn"
      type="button"
      [attr.aria-label]="'Delete ' + collection().name"
      (click)="onDelete()"
    >
      <span class="material-symbols-outlined">delete</span>
    </button>
  </div>
</article>
