<div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <header class="modal__header">
    <h2 class="modal__title" id="modal-title">New Collection</h2>
    <button class="modal__close" type="button" (click)="cancel()" aria-label="Close dialog">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </header>

  <form class="modal__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="modal__field">
      <label class="modal__label" for="collection-name">Name</label>
      <input
        id="collection-name"
        class="modal__input"
        type="text"
        formControlName="name"
        placeholder="e.g. User API v2"
        autocomplete="off"
      />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <span class="modal__error" role="alert">Name is required (min. 2 characters).</span>
      }
    </div>

    <div class="modal__field">
      <label class="modal__label" for="collection-tag">Tag</label>
      <select id="collection-tag" class="modal__select" formControlName="tag">
        <option value="" disabled>Select a tag</option>
        @for (tag of tagOptions; track tag) {
          <option [value]="tag">{{ tag }}</option>
        }
      </select>
      @if (form.controls.tag.invalid && form.controls.tag.touched) {
        <span class="modal__error" role="alert">Tag is required.</span>
      }
    </div>

    <footer class="modal__footer">
      <button class="modal__btn modal__btn--secondary" type="button" (click)="cancel()">
        Cancel
      </button>
      <button class="modal__btn modal__btn--primary" type="submit">Create</button>
    </footer>
  </form>
</div>
